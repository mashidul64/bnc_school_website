<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donate</title>
<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 400px;
  margin: auto;
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

h2 {
  color: #007bff;
}

.method {
  margin: 15px 0;
  padding: 10px;
  border-radius: 8px;
  background: #fafafa;
}

.method h3 {
  margin-bottom: 5px;
}

.number {
  font-size: 18px;
  font-weight: bold;
  color: #ff5722;
}

.copy-btn {
  margin-top: 5px;
  padding: 5px 10px;
  border: none;
  background: #007bff;
  color: #fff;
  border-radius: 5px;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="container">
  <h2>Donate Now</h2>
  <p>পাহাড়ি শিক্ষার্থীদের সহায়তায় আপনার অনুদান দিন</p>

  <div class="method">
    <h3>bKash</h3>
    <div class="number" id="bkash">017XXXXXXXX</div>
    <button class="copy-btn" onclick="copyText('bkash')">Copy</button>
  </div>

  <div class="method">
    <h3>Nagad</h3>
    <div class="number" id="nagad">018XXXXXXXX</div>
    <button class="copy-btn" onclick="copyText('nagad')">Copy</button>
  </div>

  <div class="method">
    <h3>Rocket</h3>
    <div class="number" id="rocket">019XXXXXXXX</div>
    <button class="copy-btn" onclick="copyText('rocket')">Copy</button>
  </div>

  <div class="method">
    <h3>Bank Account</h3>
    <div class="number">
      A/C Name: School Fund <br>
      A/C No: 123456789 <br>
      Bank: ABC Bank
    </div>
  </div>

</div>

<script>
function copyText(id) {
  const text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text);
  alert("Copied: " + text);
}
</script>

</body>
</html>
